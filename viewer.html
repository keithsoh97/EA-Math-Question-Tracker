<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question Viewer — A-Math Question Bank</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: #E2DDD5;
    --border2: #CBC5BB;
    --text: #1C1A17;
    --text2: #6B6560;
    --text3: #A09990;
    --accent: #2D6A4F;
    --accent-light: #D8EDDF;
    --accent-text: #1B4332;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --radius: 8px;
    --radius-lg: 14px;
  }
  body {
    background: var(--bg);
    font-family: var(--font-body);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text2); text-decoration: none;
    padding: 6px 12px; border: 1px solid var(--border);
    border-radius: var(--radius); background: none;
    cursor: pointer; font-family: var(--font-body);
    transition: all 0.12s;
  }
  .back-btn:hover { border-color: var(--border2); color: var(--text); }
  .header-title { font-family: var(--font-display); font-size: 18px; font-weight: 400; }
  .header-meta { font-size: 12px; color: var(--text3); margin-top: 1px; }

  .page-nav {
    display: flex; align-items: center; gap: 8px;
  }
  .nav-btn {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); font-size: 13px; color: var(--text2);
    cursor: pointer; font-family: var(--font-body); transition: all 0.12s;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--border2); color: var(--text); }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-indicator { font-size: 13px; color: var(--text2); white-space: nowrap; min-width: 80px; text-align: center; }

  .viewer-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px;
    overflow-y: auto;
  }

  #canvas-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    max-width: 860px;
    width: 100%;
  }
  canvas { display: block; width: 100%; height: auto; }

  .loading-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 40px; gap: 16px; color: var(--text3);
  }
  .spinner {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { font-size: 14px; }

  .error-state {
    text-align: center; padding: 80px 40px; color: var(--text2);
    max-width: 480px; margin: 0 auto;
  }
  .error-state h3 { font-family: var(--font-display); font-size: 22px; font-weight: 400; margin-bottom: 10px; color: var(--text); }
  .error-state p { font-size: 14px; line-height: 1.6; }
  .error-state a { color: var(--accent); }

  .zoom-controls {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
  }
  .zoom-btn {
    width: 28px; height: 28px; border: none; background: none;
    font-size: 16px; cursor: pointer; color: var(--text2);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .zoom-btn:hover { background: var(--bg); color: var(--text); }
  .zoom-label { font-size: 12px; color: var(--text2); min-width: 38px; text-align: center; }

  @media (max-width: 600px) {
    header { padding: 12px 16px; flex-wrap: wrap; }
    .zoom-controls { display: none; }
    .viewer-wrap { padding: 16px 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <button class="back-btn" onclick="history.back()">← Back</button>
    <div>
      <div class="header-title" id="header-title">Question Viewer</div>
      <div class="header-meta" id="header-meta"></div>
    </div>
  </div>
  <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="changeZoom(-0.15)" title="Zoom out">−</button>
      <span class="zoom-label" id="zoom-label">100%</span>
      <button class="zoom-btn" onclick="changeZoom(0.15)" title="Zoom in">+</button>
    </div>
    <div class="page-nav">
      <button class="nav-btn" id="btn-prev" onclick="changePage(-1)" disabled>← Prev</button>
      <span class="page-indicator" id="page-indicator">—</span>
      <button class="nav-btn" id="btn-next" onclick="changePage(1)" disabled>Next →</button>
    </div>
  </div>
</header>

<div class="viewer-wrap">
  <div id="canvas-container">
    <div class="loading-state" id="loading">
      <div class="spinner"></div>
      <p>Loading question paper…</p>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const params = new URLSearchParams(window.location.search);
const fileId  = params.get('id');
const startPage = parseInt(params.get('page') || '1', 10);
const label   = params.get('label') || '';

let pdfDoc    = null;
let currentPage = startPage;
let scale     = 1.4;

function getProxyUrl(id) {
  return `https://drive.google.com/uc?export=download&id=${id}`;
}

if (label) {
  document.getElementById('header-title').textContent = `Question ${label}`;
}

if (!fileId) {
  showError('No file specified.', 'Make sure the link includes a valid Google Drive file ID.');
} else {
  document.getElementById('header-meta').textContent = `Page ${startPage}`;
  loadPdf(fileId);
}

async function loadPdf(id) {
  try {
    const loadingTask = pdfjsLib.getDocument({
      url: getProxyUrl(id),
      withCredentials: false,
      cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
      cMapPacked: true,
    });
    pdfDoc = await loadingTask.promise;
    renderPage(currentPage);
  } catch(e) {
    showError(
      'Could not load the PDF.',
      'This usually means the file isn\'t set to <strong>"Anyone with the link"</strong> in Google Drive. ' +
      'Open the PDF in Drive, click Share, and set access to Anyone with the link. ' +
      '<br><br>If it\'s already shared, <a href="' + getProxyUrl(id) + '" target="_blank">try opening it directly</a>.'
    );
  }
}

async function renderPage(num) {
  const container = document.getElementById('canvas-container');

  const existingCanvas = container.querySelector('canvas');
  if (!existingCanvas) {
    container.innerHTML = '';
  }

  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale });

  let canvas = container.querySelector('canvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    container.appendChild(canvas);
  }
  const ctx = canvas.getContext('2d');
  canvas.width  = viewport.width;
  canvas.height = viewport.height;

  await page.render({ canvasContext: ctx, viewport }).promise;

  currentPage = num;
  const total = pdfDoc.numPages;
  document.getElementById('page-indicator').textContent = `Page ${num} of ${total}`;
  document.getElementById('header-meta').textContent = `Page ${num} of ${total}`;
  document.getElementById('btn-prev').disabled = num <= 1;
  document.getElementById('btn-next').disabled = num >= total;
}

function changePage(delta) {
  if (!pdfDoc) return;
  const next = currentPage + delta;
  if (next < 1 || next > pdfDoc.numPages) return;
  renderPage(next);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function changeZoom(delta) {
  scale = Math.min(3, Math.max(0.5, scale + delta));
  document.getElementById('zoom-label').textContent = Math.round(scale / 1.4 * 100) + '%';
  if (pdfDoc) renderPage(currentPage);
}

function showError(title, detail) {
  document.getElementById('canvas-container').innerHTML =
    `<div class="error-state"><h3>${title}</h3><p>${detail}</p></div>`;
}
</script>
</body>
</html>
